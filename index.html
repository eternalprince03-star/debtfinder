<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Resolve | Infinite Clarity</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-bg">
        <div class="decorative-orb orb-1"></div>
        <div class="decorative-orb orb-2"></div>
    </div>

    <main id="auth-view" class="view-container full-height">
        <div class="glass-card auth-card">
            <h1 class="brand-title">Resolve</h1>
            <div class="tabs">
                <button class="tab active" id="tab-login" onclick="switchTab('login')">Log In</button>
                <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
            </div>
            <form id="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="you@university.edu">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-luminous-primary" id="auth-btn">Log In</button>
            </form>
        </div>
    </main>

    <main id="dashboard-view" class="view-container hidden">
        <header class="dashboard-header glass-panel">
            <h2 class="cyan-glow">Debt Intelligence</h2>
            <button id="logout-btn" class="btn-luminous-secondary">Sign Out</button>
        </header>
        
        <div class="dashboard-content">
            <section id="upload-section" class="glass-card">
                <h3>1. Debt Documentation</h3>
                <input type="file" id="document-upload">
                <button id="analyze-btn" class="btn-luminous-primary" disabled>Analyze Records</button>
                <div id="loading-spinner" class="hidden">Parsing...</div>
            </section>

            <section id="analysis-section" class="glass-card hidden">
                <h3>2. Financial Outlook</h3>
                <p id="debt-status"></p>
                <p id="debt-amount"></p>
                <ul id="prediction-list"></ul>
            </section>

            <section id="solutions-section" class="glass-card hidden">
                <h3>3. Resolution Roadmap</h3>
                <form id="address-form">
                    <input type="text" id="user-address" required>
                    <button type="submit">Save</button>
                </form>
                <div id="actionable-solutions" class="hidden">
                    <div id="solutions-list"></div>
                </div>
            </section>

            <button id="clear-btn" class="btn-subtle-danger">Clear Records</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
